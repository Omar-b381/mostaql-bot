name: Mostaql Project Scanner

on:
  schedule:
    # سيتم التشغيل كل 15 دقيقة
    - cron: '*/15 * * * *'
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً من واجهة GitHub للتجربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-genai python-dotenv

      - name: Run script
        env:
          # ربط الأسرار (Secrets) بالمتغيرات التي يستخدمها الكود
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py